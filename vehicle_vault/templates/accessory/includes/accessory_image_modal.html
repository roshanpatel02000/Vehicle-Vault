<!-- ===== ACCESSORY IMAGE POPUP MODAL ===== -->
<div id="vv-acc-modal-overlay" class="vv-modal-overlay">
    <div id="vv-acc-modal" class="vv-modal" style="max-width: 500px; background: #13151a; border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; overflow: hidden; transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);">
        <!-- Close Button -->
        <button id="vv-acc-modal-close" class="vv-modal-close" aria-label="Close Modal" onclick="closeAccModal()" style="background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>

        <!-- Body -->
        <div style="padding: 30px; display: flex; flex-direction: column; align-items: center; text-align: center;">
            <div style="width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; background: #0d0f14; border-radius: 12px; margin-bottom: 24px; overflow: hidden; position: relative;">
                <img id="vv-acc-modal-img" src="" style="max-width: 100%; max-height: 100%; object-fit: contain; display: none;">
                <div id="vv-acc-modal-placeholder" style="display: flex;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                </div>
            </div>

            <p id="vv-acc-modal-tag" style="font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.12em; color: #ff5a00; text-transform: uppercase; margin: 0 0 8px;"></p>
            <h3 id="vv-acc-modal-title" style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 800; color: #fff; margin: 0 0 8px; line-height: 1.2;"></h3>
            <p id="vv-acc-modal-price" style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 800; color: #ff5a00; margin: 0 0 16px;"></p>
            
            <p id="vv-acc-modal-desc" style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; margin: 0; display: none;"></p>
        </div>
    </div>
</div>

<script>
    function openAccModal(btn) {
        const overlay = document.getElementById('vv-acc-modal-overlay');
        const img = document.getElementById('vv-acc-modal-img');
        const placeholder = document.getElementById('vv-acc-modal-placeholder');
        const imageSrc = btn.dataset.image;

        if (imageSrc && imageSrc !== "") {
            img.src = imageSrc;
            img.style.display = 'block';
            placeholder.style.display = 'none';
        } else {
            img.style.display = 'none';
            placeholder.style.display = 'flex';
        }

        document.getElementById('vv-acc-modal-title').textContent = btn.dataset.name || '';
        document.getElementById('vv-acc-modal-tag').textContent = btn.dataset.tag || '';
        document.getElementById('vv-acc-modal-price').textContent = btn.dataset.price || '';
        
        const descEl = document.getElementById('vv-acc-modal-desc');
        const descText = btn.dataset.desc;
        if (descText && descText.trim() !== "") {
            descEl.textContent = descText;
            descEl.style.display = 'block';
        } else {
            descEl.style.display = 'none';
        }

        overlay.classList.add('active');
        document.querySelector('#vv-acc-modal').style.transform = 'scale(1)';
        document.body.style.overflow = 'hidden';
    }

    function closeAccModal() {
        const overlay = document.getElementById('vv-acc-modal-overlay');
        const modal = document.querySelector('#vv-acc-modal');
        if (modal) modal.style.transform = 'scale(0.95)';
        setTimeout(() => {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }, 150);
    }

    document.addEventListener("DOMContentLoaded", function() {
        const accOverlay = document.getElementById('vv-acc-modal-overlay');
        if (accOverlay) {
            accOverlay.addEventListener('click', e => { 
                if (e.target === accOverlay) closeAccModal(); 
            });
            document.addEventListener('keydown', e => { 
                if (e.key === 'Escape' && accOverlay.classList.contains('active')) closeAccModal(); 
            });
        }
    });
</script>
